<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yahia | Official Store v1.0.5</title>
    
    <!-- Stable Firebase Compat Libraries -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- UI Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #FFFFFF;
            color: #111111;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .nav-blur {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #F2F2F7;
        }

        .ios-card {
            background: #FFFFFF;
            border-radius: 32px;
            border: 1px solid #F2F2F7;
            box-shadow: 0 4px 40px rgba(0,0,0,0.02);
        }

        .tab-btn {
            padding: 10px 24px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 14px;
            transition: 0.2s;
            color: #8E8E93;
        }

        .tab-btn.active {
            background: #000;
            color: #FFF;
        }

        .glyph-item {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F8F8F8;
            border-radius: 20px;
            font-weight: 800;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
        }

        .glyph-item.selected {
            background: #000;
            color: #FFF;
            transform: scale(1.1);
        }

        .install-btn {
            background: linear-gradient(135deg, #007AFF 0%, #00C6FF 100%);
            color: white;
            font-weight: 800;
        }

        .hidden { display: none !important; }
        
        .floating {
            animation: float 5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .pop-in {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .vault-view {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 1000;
            display: none;
            flex-direction: column;
        }
    </style>
</head>
<body>

    <nav class="nav-blur fixed top-0 w-full z-50 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div onclick="location.reload(true)" class="w-10 h-10 bg-black rounded-xl flex items-center justify-center text-white font-black cursor-pointer">Y</div>
                <span class="font-extrabold text-xl tracking-tight">YAHIA</span>
            </div>
            <div class="bg-[#F2F2F7] p-1 rounded-2xl flex">
                <button onclick="showTab('shop')" id="t-shop" class="tab-btn active">Shop</button>
                <button onclick="showTab('app')" id="t-app" class="tab-btn">App</button>
            </div>
        </div>
    </nav>

    <main class="pt-28 pb-20 px-6 max-w-6xl mx-auto">
        
        <div id="view-shop">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <div class="lg:col-span-5">
                    <div class="ios-card p-12 aspect-square flex flex-col items-center justify-center relative bg-[#F9F9FB] overflow-hidden">
                        <div id="main-char" class="floating text-[150px] font-black tracking-tighter transition-all duration-500">Y</div>
                        <p id="main-label" class="mt-10 font-bold text-gray-400 uppercase tracking-widest text-xs">Standard Edition</p>
                    </div>
                </div>

                <div class="lg:col-span-7 space-y-10">
                    <div>
                        <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-5">Select Glyph</h3>
                        <!-- THIS GRID MUST BE GENERATED BY JAVASCRIPT -->
                        <div id="char-grid" class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-3"></div>
                    </div>

                    <div class="ios-card p-8 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <input id="f-name" type="text" placeholder="Your Name" class="w-full bg-[#F2F2F7] p-5 rounded-2xl outline-none font-bold">
                            <select id="f-color" class="w-full bg-[#F2F2F7] p-5 rounded-2xl outline-none font-bold">
                                <option value="Black">Onyx Black</option>
                                <option value="Gold">24K Gold</option>
                                <option value="Silver">Sterling Silver</option>
                                <option value="White">Pure Ceramic</option>
                            </select>
                        </div>
                        <button onclick="submitOrder()" class="w-full bg-black text-white p-6 rounded-2xl font-black text-lg">Place Reservation</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-app" class="hidden text-center max-w-lg mx-auto pt-10">
            <div class="w-28 h-28 bg-black rounded-[40px] shadow-2xl flex items-center justify-center mx-auto mb-10">
                <span class="text-white text-6xl font-black">Y</span>
            </div>
            <h1 class="text-4xl font-black mb-4">Yahia Official App</h1>
            <a href="release.apk?v=1.0.5" download="release.apk" class="install-btn block w-full py-6 rounded-3xl text-xl font-black no-underline">Download APK</a>
        </div>
    </main>

    <div id="vault-ui" class="vault-view">
        <div class="p-6 border-b flex justify-between items-center">
            <h2 class="font-black text-3xl">VAULT_LOGS</h2>
            <button onclick="document.getElementById('vault-ui').style.display='none'" class="bg-black text-white px-8 py-3 rounded-2xl font-bold text-xs">CLOSE</button>
        </div>
        <div id="vault-data" class="flex-1 overflow-y-auto p-6 space-y-4 bg-gray-50"></div>
    </div>

    <script>
        // Version Buster: Helps force refresh
        console.log("App Version 1.0.5 Loaded");

        let selChar = "Y";
        let selColor = "Black";
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        chars.push("PLATE");

        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'yahia-final-stable-v5';

        // THE CORE FUNCTION THAT MAKES ALL LETTERS APPEAR
        function renderGrid() {
            const grid = document.getElementById('char-grid');
            if (!grid) return;
            grid.innerHTML = chars.map(c => `
                <div onclick="pick('${c}')" class="glyph-item ${selChar === c ? 'selected' : ''}">
                    ${c === 'PLATE' ? '<span class="text-[8px]">PLATE</span>' : c}
                </div>
            `).join('');
        }

        function pick(c) {
            selChar = c;
            const display = document.getElementById('main-char');
            display.innerText = c === 'PLATE' ? '■' : c;
            display.classList.remove('pop-in');
            void display.offsetWidth; 
            display.classList.add('pop-in');
            document.getElementById('main-label').innerText = c === 'PLATE' ? 'Custom Molding' : `Classic ${c} Edition`;
            renderGrid();
        }

        document.getElementById('f-color').onchange = (e) => {
            selColor = e.target.value;
            const colors = { Black: '#111', Gold: '#D4AF37', Silver: '#888', White: '#CCC' };
            document.getElementById('main-char').style.color = colors[selColor];
        };

        function showTab(t) {
            document.getElementById('view-shop').classList.toggle('hidden', t !== 'shop');
            document.getElementById('view-app').classList.toggle('hidden', t !== 'app');
            document.getElementById('t-shop').classList.toggle('active', t === 'shop');
            document.getElementById('t-app').classList.toggle('active', t === 'app');
        }

        async function submitOrder() {
            const name = document.getElementById('f-name').value.trim();
            if(!name) return;
            if(name === 'MADMIN/Vault' && selChar === 'M' && selColor === 'Gold') {
                openVault();
                return;
            }
            try {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('orders').add({
                    name, char: selChar, color: selColor, created: Date.now()
                });
                alert("Saved to Vault.");
                document.getElementById('f-name').value = '';
            } catch(e) { alert("Error."); }
        }

        function openVault() {
            document.getElementById('vault-ui').style.display = 'flex';
            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('orders')
              .onSnapshot(snap => {
                const data = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                data.sort((a,b) => b.created - a.created);
                const list = document.getElementById('vault-data');
                list.innerHTML = data.map(o => `
                    <div class="bg-white p-6 rounded-3xl flex justify-between items-center border">
                        <div><p class="font-black uppercase">${o.name}</p><p class="text-[9px] font-bold text-gray-400 uppercase">${o.color} — ${o.char}</p></div>
                        <button onclick="del('${o.id}')" class="text-red-500 font-black text-xs">DELETE</button>
                    </div>
                `).join('');
            });
        }

        async function del(id) {
            if(confirm("Delete?")) await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('orders').doc(id).delete();
        }

        firebase.auth().signInAnonymously();
        
        // Final force render
        window.onload = renderGrid;
        renderGrid();
    </script>
</body>
</html>
