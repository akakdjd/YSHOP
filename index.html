<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yahia Shop | 3D Alpha Collective</title>
    <!-- Essential Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #facc15; border-radius: 10px; }
        
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(1000%); }
        }
        .scan-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #facc15, transparent);
            animation: scan 4s linear infinite;
        }

        .glitch {
            animation: glitch 0.3s cubic-bezier(.25,.46,.45,.94) both infinite;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // Firebase Imports from CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'yahia-shop-pro';

        const PerspectiveView = ({ label, char, color, rotation }) => {
            const colorMap = {
                Yellow: '#facc15', Red: '#ef4444', Blue: '#3b82f6', Green: '#22c55e',
                Purple: '#a855f7', Pink: '#ec4899', White: '#ffffff', Black: '#111111',
                Gold: '#fbbf24', Silver: '#9ca3af'
            };

            return (
                <div className="flex flex-col items-center gap-2">
                    <span className="text-[8px] mono text-gray-600 uppercase tracking-widest">{label}</span>
                    <div className="w-full aspect-square glass rounded-2xl flex items-center justify-center relative overflow-hidden group">
                        <motion.div 
                            animate={{ rotateY: rotation, scale: [1, 1.08, 1] }}
                            transition={{ duration: 6, repeat: Infinity, ease: "easeInOut" }}
                            style={{ color: colorMap[color] }}
                            className="text-5xl font-black drop-shadow-[0_0_25px_rgba(250,204,21,0.4)]"
                        >
                            {char === "PLATE" ? "■" : char}
                        </motion.div>
                        <div className="absolute bottom-4 w-12 h-1 bg-black/60 blur-md rounded-full" />
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [name, setName] = useState('');
            const [selectedLetter, setSelectedLetter] = useState('Y');
            const [selectedColor, setSelectedColor] = useState('Yellow');
            const [globalOrders, setGlobalOrders] = useState([]);
            const [showVault, setShowVault] = useState(false);
            const [isOrdering, setIsOrdering] = useState(false);
            const [easterEggActive, setEasterEggActive] = useState(false);

            const alphabet = useMemo(() => [...("ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("")), "PLATE"], []);
            const colors = ["Yellow", "Red", "Blue", "Green", "Purple", "Pink", "White", "Black", "Gold", "Silver"];

            useEffect(() => {
                signInAnonymously(auth).then(cred => setUser(cred.user));
            }, []);

            useEffect(() => {
                if (!user) return;
                const ordersRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                const unsubscribe = onSnapshot(ordersRef, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setGlobalOrders(data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                });
                return () => unsubscribe();
            }, [user]);

            const handleOrder = async (e) => {
                e.preventDefault();
                if (!name.trim()) return;

                // Secret Vault Logic
                if (name === "MADMIN/Vault" && selectedLetter === "M" && selectedColor === "Yellow") {
                    setShowVault(true);
                    return;
                }

                // Easter Egg Logic
                if (name.toLowerCase() === "yahiashop.netlify.app") {
                    setEasterEggActive(true);
                    setTimeout(() => {
                        setEasterEggActive(false);
                        setName('');
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    }, 2000);
                    return;
                }

                setIsOrdering(true);
                try {
                    const ordersRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                    await addDoc(ordersRef, {
                        customerName: name,
                        item: selectedLetter,
                        color: selectedColor,
                        createdAt: serverTimestamp(),
                        userId: user.uid
                    });
                    setName('');
                    setTimeout(() => setIsOrdering(false), 1200);
                } catch (err) {
                    setIsOrdering(false);
                }
            };

            if (easterEggActive) {
                return (
                    <div className="fixed inset-0 bg-yellow-400 flex flex-col items-center justify-center z-[200] glitch">
                        <h1 className="text-black text-6xl font-black italic">YAHIASHOP.NETLIFY.APP</h1>
                        <p className="text-black mono font-bold mt-4">RELOADING INTERFACE...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 md:p-10 lg:p-16">
                    {/* Background Orbs */}
                    <div className="fixed inset-0 pointer-events-none z-0">
                        <div className="absolute top-[-10%] left-[-10%] w-[70vw] h-[70vw] bg-yellow-500/5 blur-[150px] rounded-full" />
                        <div className="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-white/5 blur-[150px] rounded-full" />
                    </div>

                    <header className="max-w-7xl mx-auto mb-16 flex justify-between items-end relative z-10">
                        <div>
                            <motion.div initial={{y:-20}} animate={{y:0}} className="flex items-center gap-4 mb-4">
                                <div className="w-12 h-12 bg-yellow-400 text-black flex items-center justify-center font-black text-2xl rounded-2xl shadow-[0_0_30px_rgba(250,204,21,0.4)]">Y</div>
                                <h1 className="text-3xl font-black tracking-tighter uppercase leading-none">Yahia <br/> Shop</h1>
                            </motion.div>
                            <p className="text-[10px] mono text-gray-600 uppercase tracking-[0.4em]">Proprietary 3D Glyph Engine v4.0</p>
                        </div>
                        <div className="text-right hidden sm:block mono">
                            <p className="text-[10px] text-yellow-400/70 uppercase">Uplink: Secure</p>
                            <p className="text-[10px] text-gray-800 uppercase">DB_PATH: {appId}</p>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10 relative z-10">
                        {/* 3D Previews */}
                        <div className="lg:col-span-4 space-y-6">
                            <motion.div initial={{opacity:0, x:-20}} animate={{opacity:1, x:0}} className="glass p-10 rounded-[3rem] border-white/5 shadow-2xl">
                                <h3 className="text-[10px] mono font-bold text-yellow-400 mb-10 uppercase tracking-widest border-b border-white/5 pb-4">Real-Time Schematic</h3>
                                <div className="grid grid-cols-2 gap-8">
                                    <PerspectiveView label="Front_0°" char={selectedLetter} color={selectedColor} rotation={0} />
                                    <PerspectiveView label="Back_180°" char={selectedLetter} color={selectedColor} rotation={180} />
                                    <PerspectiveView label="Left_-90°" char={selectedLetter} color={selectedColor} rotation={-90} />
                                    <PerspectiveView label="Right_90°" char={selectedLetter} color={selectedColor} rotation={90} />
                                </div>
                            </motion.div>
                        </div>

                        {/* Array Selector */}
                        <div className="lg:col-span-5">
                            <motion.div initial={{opacity:0}} animate={{opacity:1}} className="glass p-10 rounded-[3rem] border-white/5 h-full">
                                <h3 className="text-[10px] mono font-bold text-gray-600 mb-10 uppercase tracking-widest border-b border-white/5 pb-4">Glyph Library</h3>
                                <div className="grid grid-cols-5 sm:grid-cols-6 gap-3">
                                    {alphabet.map((l, i) => (
                                        <button
                                            key={l}
                                            onClick={() => setSelectedLetter(l)}
                                            className={`aspect-square flex items-center justify-center rounded-2xl transition-all duration-300 border-2 ${
                                                selectedLetter === l 
                                                ? 'bg-yellow-400 border-yellow-400 text-black shadow-[0_0_20px_rgba(250,204,21,0.3)] scale-110 z-10' 
                                                : 'bg-white/5 border-transparent text-gray-500 hover:border-white/20 hover:text-white'
                                            }`}
                                        >
                                            <span className={`font-black ${l === 'PLATE' ? 'text-[8px]' : 'text-xl'}`}>{l}</span>
                                        </button>
                                    ))}
                                </div>
                            </motion.div>
                        </div>

                        {/* Control Unit */}
                        <div className="lg:col-span-3">
                            <motion.div initial={{opacity:0, x:20}} animate={{opacity:1, x:0}} className="glass p-10 rounded-[3rem] border-white/5 sticky top-10 shadow-2xl">
                                <h3 className="text-[10px] mono font-bold text-yellow-400 mb-10 uppercase tracking-widest border-b border-white/5 pb-4">Auth & Transmit</h3>
                                <form onSubmit={handleOrder} className="space-y-8">
                                    <div className="space-y-6">
                                        <div className="group">
                                            <label className="text-[9px] mono text-gray-500 mb-2 block uppercase font-bold">Client Identity</label>
                                            <input 
                                                value={name}
                                                onChange={(e) => setName(e.target.value)}
                                                placeholder="Enter Full Name"
                                                className="w-full bg-black/60 border border-white/10 rounded-2xl px-6 py-5 focus:border-yellow-400 outline-none transition-all font-bold text-sm text-white placeholder:text-gray-800"
                                            />
                                        </div>
                                        <div className="group">
                                            <label className="text-[9px] mono text-gray-500 mb-2 block uppercase font-bold">Material Finish</label>
                                            <div className="relative">
                                                <select 
                                                    value={selectedColor}
                                                    onChange={(e) => setSelectedColor(e.target.value)}
                                                    className="w-full bg-black/60 border border-white/10 rounded-2xl px-6 py-5 focus:border-yellow-400 outline-none appearance-none cursor-pointer font-bold text-sm text-white"
                                                >
                                                    {colors.map(c => <option key={c} value={c} className="bg-[#050505]">{c}</option>)}
                                                </select>
                                                <div className="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none text-yellow-400/50">▼</div>
                                            </div>
                                        </div>
                                    </div>

                                    <button 
                                        disabled={isOrdering}
                                        className="w-full bg-yellow-400 text-black py-6 rounded-2xl font-black text-xs uppercase tracking-[0.2em] hover:bg-yellow-300 transition-all active:scale-95 shadow-2xl shadow-yellow-400/20 disabled:opacity-50"
                                    >
                                        {isOrdering ? 'Synching...' : 'Initialize Order'}
                                    </button>
                                </form>
                            </motion.div>
                        </div>
                    </main>

                    {/* Vault Overlay */}
                    <AnimatePresence>
                        {showVault && (
                            <motion.div 
                                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                                className="fixed inset-0 z-[150] bg-black/98 backdrop-blur-3xl p-6 flex items-center justify-center"
                            >
                                <div className="w-full max-w-5xl h-[85vh] glass border-yellow-400/10 rounded-[4rem] p-12 flex flex-col relative overflow-hidden shadow-[0_0_100px_rgba(0,0,0,1)]">
                                    <div className="scan-line absolute top-0 left-0 w-full opacity-10" />
                                    
                                    <div className="flex justify-between items-start mb-16 relative z-10">
                                        <div>
                                            <h2 className="text-6xl font-black text-yellow-400 italic tracking-tighter leading-none">THE VAULT</h2>
                                            <p className="text-[10px] mono text-gray-600 mt-4 uppercase tracking-[0.5em]">Live Global Order Log — Total Records: {globalOrders.length}</p>
                                        </div>
                                        <button onClick={() => setShowVault(false)} className="bg-white text-black px-10 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-yellow-400 transition-all">Close_Vault</button>
                                    </div>

                                    <div className="flex-1 overflow-y-auto space-y-4 pr-6 custom-scrollbar relative z-10">
                                        {globalOrders.map((o, idx) => (
                                            <motion.div 
                                                initial={{opacity:0, y:10}} animate={{opacity:1, y:0}} transition={{delay: idx * 0.05}}
                                                key={o.id} 
                                                className="bg-white/[0.03] border border-white/5 p-8 rounded-[2rem] flex justify-between items-center group hover:bg-white/[0.06] hover:border-yellow-400/20 transition-all"
                                            >
                                                <div className="flex items-center gap-8">
                                                    <div className="w-16 h-16 bg-yellow-400/5 border border-yellow-400/20 text-yellow-400 rounded-2xl flex items-center justify-center font-black text-3xl shadow-inner">
                                                        {o.item === 'PLATE' ? '■' : o.item}
                                                    </div>
                                                    <div>
                                                        <p className="font-bold text-xl uppercase tracking-tight text-white group-hover:text-yellow-400 transition-colors">{o.customerName}</p>
                                                        <div className="flex gap-4 mt-1">
                                                            <span className="text-[10px] mono text-gray-500 uppercase">{o.color} finish</span>
                                                            <span className="text-[10px] mono text-gray-700">|</span>
                                                            <span className="text-[10px] mono text-gray-700">USER_UID: {o.userId?.slice(0, 12)}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="text-right mono">
                                                    <p className="text-xs text-yellow-400/40 font-bold italic">{o.createdAt ? new Date(o.createdAt.seconds * 1000).toLocaleTimeString() : 'SYNCING...'}</p>
                                                    <p className="text-[10px] text-gray-800 font-bold mt-2 tracking-widest">ORDER_REF_{o.id.slice(-6).toUpperCase()}</p>
                                                </div>
                                            </motion.div>
                                        ))}
                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
