<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yahia Shop | Premium 3D Alpha</title>
    <!-- Core Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F5E6BE;
        }
        body {
            background-color: #F8F9FA;
            color: #1A1A1A;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .white-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }
        
        .glitch-white {
            animation: glitch 0.3s cubic-bezier(.25,.46,.45,.94) both infinite;
            background: white !important;
            color: black !important;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        #loading-screen {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }
        .loader-bar {
            width: 200px;
            height: 2px;
            background: #eee;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }
        .loader-progress {
            width: 40%;
            height: 100%;
            background: #D4AF37;
            position: absolute;
            animation: load 1.5s infinite ease-in-out;
        }
        @keyframes load {
            0% { left: -40%; }
            100% { left: 100%; }
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div style="font-weight: 800; font-size: 24px; letter-spacing: -1px;">YAHIA SHOP</div>
        <div class="loader-bar"><div class="loader-progress"></div></div>
        <button id="force-start" style="margin-top: 30px; font-size: 10px; color: #999; text-decoration: underline; cursor: pointer;">
            Click here if stuck
        </button>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // Configuration Injected via env
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'yahia-premium-shop';

        // Initialize Firebase Compat Mode (More stable for single HTML)
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const PerspectiveView = ({ label, char, color, rotation }) => {
            const colorMap = {
                Yellow: '#D4AF37', Red: '#DC2626', Blue: '#2563EB', Green: '#16A34A',
                Purple: '#9333EA', Pink: '#DB2777', White: '#6B7280', Black: '#000000',
                Gold: '#B8860B', Silver: '#71717A'
            };

            return (
                <div className="flex flex-col items-center gap-2">
                    <span className="text-[9px] mono text-gray-400 font-bold uppercase tracking-widest">{label}</span>
                    <div className="w-full aspect-square bg-white border border-gray-100 rounded-3xl flex items-center justify-center relative shadow-sm">
                        <motion.div 
                            animate={{ rotateY: rotation, scale: [1, 1.05, 1] }}
                            transition={{ duration: 5, repeat: Infinity, ease: "easeInOut" }}
                            style={{ color: colorMap[color] || '#D4AF37' }}
                            className="text-5xl font-black drop-shadow-md"
                        >
                            {char === "PLATE" ? "■" : char}
                        </motion.div>
                        <div className="absolute bottom-4 w-8 h-1 bg-gray-100 blur-[2px] rounded-full" />
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null);
            const [name, setName] = useState('');
            const [selectedLetter, setSelectedLetter] = useState('Y');
            const [selectedColor, setSelectedColor] = useState('Yellow');
            const [globalOrders, setGlobalOrders] = useState([]);
            const [showVault, setShowVault] = useState(false);
            const [isOrdering, setIsOrdering] = useState(false);
            const [easterEgg, setEasterEgg] = useState(false);

            const alphabet = useMemo(() => [...("ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("")), "PLATE"], []);
            const colors = ["Yellow", "Red", "Blue", "Green", "Purple", "Pink", "White", "Black", "Gold", "Silver"];

            useEffect(() => {
                // Auth & Clear Loader
                auth.signInAnonymously().then(cred => {
                    setUser(cred.user);
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
                });

                // Global Force Start Handler
                document.getElementById('force-start').onclick = () => {
                    document.getElementById('loading-screen').style.display = 'none';
                };
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsub = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('orders')
                    .onSnapshot(snap => {
                        const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        setGlobalOrders(data.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                    });
                return () => unsub();
            }, [user]);

            const handleOrder = async (e) => {
                e.preventDefault();
                if (!name.trim()) return;

                if (name === "MADMIN/Vault" && selectedLetter === "M" && selectedColor === "Yellow") {
                    setShowVault(true);
                    return;
                }

                if (name.toLowerCase() === "yahiashop.netlify.app") {
                    setEasterEgg(true);
                    setTimeout(() => { setEasterEgg(false); setName(''); }, 2500);
                    return;
                }

                setIsOrdering(true);
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('orders').add({
                        customerName: name,
                        item: selectedLetter,
                        color: selectedColor,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        userId: user.uid
                    });
                    setName('');
                    setTimeout(() => setIsOrdering(false), 1000);
                } catch (err) {
                    setIsOrdering(false);
                }
            };

            if (easterEgg) {
                return (
                    <div className="fixed inset-0 bg-white flex flex-col items-center justify-center z-[200] glitch-white">
                        <h1 className="text-black text-4xl md:text-6xl font-black italic">YAHIASHOP.NETLIFY.APP</h1>
                        <div className="w-12 h-1 bg-black mt-4 animate-pulse" />
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#F8F9FA] text-[#1A1A1A] px-4 py-8 md:p-12">
                    {/* Soft Background Detail */}
                    <div className="fixed top-0 right-0 w-[500px] h-[500px] bg-yellow-100/30 blur-[100px] rounded-full -z-10" />
                    
                    <header className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-16 gap-4">
                        <div className="flex items-center gap-4">
                            <div className="w-14 h-14 bg-black text-white flex items-center justify-center font-black text-2xl rounded-2xl shadow-xl shadow-black/10">Y</div>
                            <div>
                                <h1 className="text-2xl font-extrabold tracking-tight leading-none uppercase">Yahia Shop</h1>
                                <p className="text-[10px] mono text-gray-400 font-bold tracking-[0.3em] mt-1">Limited 3D Collection</p>
                            </div>
                        </div>
                        <div className="flex gap-4">
                            <div className="px-4 py-2 bg-white rounded-xl border border-gray-100 shadow-sm text-[10px] font-bold text-green-600 flex items-center gap-2">
                                <span className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse" />
                                CLOUD SECURE
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10">
                        {/* 3D Previews */}
                        <div className="lg:col-span-4">
                            <motion.div initial={{opacity:0, y:20}} animate={{opacity:1, y:0}} className="white-glass p-8 rounded-[2.5rem] border border-white">
                                <h3 className="text-[10px] mono font-bold text-gray-400 mb-8 uppercase tracking-widest">Render Output</h3>
                                <div className="grid grid-cols-2 gap-6">
                                    <PerspectiveView label="FR_00" char={selectedLetter} color={selectedColor} rotation={0} />
                                    <PerspectiveView label="BK_18" char={selectedLetter} color={selectedColor} rotation={180} />
                                    <PerspectiveView label="L_90" char={selectedLetter} color={selectedColor} rotation={-90} />
                                    <PerspectiveView label="R_90" char={selectedLetter} color={selectedColor} rotation={90} />
                                </div>
                            </motion.div>
                        </div>

                        {/* Grid */}
                        <div className="lg:col-span-5">
                            <motion.div initial={{opacity:0}} animate={{opacity:1}} className="white-glass p-8 rounded-[2.5rem] h-full border border-white">
                                <h3 className="text-[10px] mono font-bold text-gray-400 mb-8 uppercase tracking-widest">Inventory List</h3>
                                <div className="grid grid-cols-5 md:grid-cols-6 gap-3">
                                    {alphabet.map((l) => (
                                        <button
                                            key={l}
                                            onClick={() => setSelectedLetter(l)}
                                            className={`aspect-square flex items-center justify-center rounded-2xl transition-all font-bold border ${
                                                selectedLetter === l 
                                                ? 'bg-black text-white border-black shadow-lg scale-105' 
                                                : 'bg-white border-gray-100 text-gray-400 hover:border-black hover:text-black'
                                            }`}
                                        >
                                            <span className={l === 'PLATE' ? 'text-[8px]' : 'text-xl'}>{l}</span>
                                        </button>
                                    ))}
                                </div>
                            </motion.div>
                        </div>

                        {/* Order */}
                        <div className="lg:col-span-3">
                            <motion.div initial={{opacity:0, x:20}} animate={{opacity:1, x:0}} className="white-glass p-8 rounded-[2.5rem] border border-white sticky top-10">
                                <h3 className="text-[10px] mono font-bold text-gray-400 mb-8 uppercase tracking-widest">Shipment Log</h3>
                                <form onSubmit={handleOrder} className="space-y-6">
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-400 mb-2 block uppercase">Customer</label>
                                            <input 
                                                value={name}
                                                onChange={(e) => setName(e.target.value)}
                                                placeholder="ENTER NAME"
                                                className="w-full bg-gray-50 border border-gray-100 rounded-2xl px-5 py-4 focus:bg-white focus:border-black outline-none transition-all font-bold text-sm"
                                            />
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-400 mb-2 block uppercase">Coating</label>
                                            <select 
                                                value={selectedColor}
                                                onChange={(e) => setSelectedColor(e.target.value)}
                                                className="w-full bg-gray-50 border border-gray-100 rounded-2xl px-5 py-4 focus:bg-white focus:border-black outline-none appearance-none cursor-pointer font-bold text-sm"
                                            >
                                                {colors.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                    <button 
                                        disabled={isOrdering}
                                        className="w-full bg-black text-white py-5 rounded-2xl font-bold text-xs uppercase tracking-widest hover:bg-gray-800 transition-all active:scale-95 disabled:opacity-50"
                                    >
                                        {isOrdering ? 'Processing...' : 'Place Order'}
                                    </button>
                                </form>
                            </motion.div>
                        </div>
                    </main>

                    {/* Secret Vault */}
                    <AnimatePresence>
                        {showVault && (
                            <motion.div 
                                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                                className="fixed inset-0 z-[150] bg-white/95 backdrop-blur-xl p-6 flex items-center justify-center"
                            >
                                <div className="w-full max-w-4xl h-[80vh] white-glass rounded-[4rem] p-12 flex flex-col border border-gray-100">
                                    <div className="flex justify-between items-start mb-12">
                                        <div>
                                            <h2 className="text-5xl font-black text-black tracking-tighter italic uppercase">Vault Feed</h2>
                                            <p className="text-[10px] mono text-gray-400 font-bold uppercase tracking-widest mt-2">Active Database: {globalOrders.length} Entries</p>
                                        </div>
                                        <button onClick={() => setShowVault(false)} className="bg-black text-white px-8 py-3 rounded-2xl font-bold text-[10px] uppercase">Exit</button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto space-y-3 pr-4 custom-scrollbar">
                                        {globalOrders.map((o) => (
                                            <div key={o.id} className="bg-white border border-gray-100 p-6 rounded-3xl flex justify-between items-center hover:border-black transition-all">
                                                <div className="flex items-center gap-6">
                                                    <div className="w-12 h-12 bg-black text-white rounded-xl flex items-center justify-center font-black text-xl">
                                                        {o.item === 'PLATE' ? '■' : o.item}
                                                    </div>
                                                    <div>
                                                        <p className="font-bold text-lg uppercase tracking-tight">{o.customerName}</p>
                                                        <p className="text-[10px] mono text-gray-400 font-bold uppercase">{o.color}</p>
                                                    </div>
                                                </div>
                                                <div className="text-right mono text-[10px] text-gray-300 font-bold">
                                                    {o.createdAt ? new Date(o.createdAt.seconds * 1000).toLocaleTimeString() : '...'}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
