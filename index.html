<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yahia | Official Store v2.0.0</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { background: #FFFFFF; color: #111; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        .nav-blur { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid #F2F2F7; }
        .ios-card { background: #FFF; border-radius: 30px; border: 1px solid #F2F2F7; box-shadow: 0 4px 30px rgba(0,0,0,0.02); }
        .tab-btn { padding: 10px 20px; border-radius: 12px; font-weight: 700; color: #8E8E93; transition: 0.2s; }
        .tab-btn.active { background: #000; color: #FFF; }
        
        /* THE GRID ITEMS */
        #char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        @media (min-width: 640px) { #char-grid { grid-template-columns: repeat(8, 1fr); } }
        
        .glyph-box {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F8F8F8;
            border-radius: 18px;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .glyph-box.active { background: #000; color: #FFF; transform: scale(1.1); }
        
        .floating { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav class="nav-blur fixed top-0 w-full z-50 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 bg-black rounded-lg flex items-center justify-center text-white font-black">Y</div>
                <span class="font-extrabold tracking-tighter">YAHIA</span>
            </div>
            <div class="bg-[#F2F2F7] p-1 rounded-xl flex">
                <button onclick="tab('shop')" id="t-shop" class="tab-btn active text-xs">SHOP</button>
                <button onclick="tab('app')" id="t-app" class="tab-btn text-xs">APP</button>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-10 px-6 max-w-5xl mx-auto">
        
        <div id="view-shop" class="space-y-8">
            <!-- 3D PREVIEW -->
            <div class="ios-card p-10 flex flex-col items-center bg-[#FAFAFC]">
                <div id="big-char" class="floating text-9xl font-black transition-all duration-300">Y</div>
                <p id="char-label" class="mt-6 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Model Y - Original</p>
            </div>

            <!-- THE GRID -->
            <div>
                <h3 class="text-[10px] font-bold text-gray-400 uppercase mb-4 tracking-widest">Select Character</h3>
                <div id="char-grid">
                    <!-- JS will force-inject buttons here -->
                </div>
            </div>

            <!-- ORDER FORM -->
            <div class="ios-card p-6 space-y-4">
                <input id="inp-name" type="text" placeholder="Your Name" class="w-full bg-[#F2F2F7] p-4 rounded-2xl outline-none font-bold">
                <select id="inp-color" class="w-full bg-[#F2F2F7] p-4 rounded-2xl outline-none font-bold">
                    <option value="Black">Black Finish</option>
                    <option value="Gold">Gold Finish</option>
                    <option value="Silver">Silver Finish</option>
                </select>
                <button onclick="order()" class="w-full bg-black text-white p-5 rounded-2xl font-black">Complete Reservation</button>
            </div>
        </div>

        <!-- APP SECTION -->
        <div id="view-app" class="hidden text-center py-10">
            <div class="w-20 h-20 bg-black rounded-3xl mx-auto mb-6 flex items-center justify-center text-white text-4xl font-black">Y</div>
            <h2 class="text-2xl font-black mb-2">Yahia Mobile</h2>
            <p class="text-gray-400 text-sm mb-8">Official Android Release</p>
            <a href="release.apk?v=2" download class="block w-full bg-blue-600 text-white p-5 rounded-2xl font-bold no-underline">Download APK</a>
        </div>
    </main>

    <script>
        // --- EMERGENCY CACHE BUSTER ---
        console.log("CRITICAL UPDATE V2.0.0 LOADED");

        let currentLetter = "Y";
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        alphabet.push("PLATE");

        // --- FIREBASE ---
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'yahia-v2-stable';

        // --- FORCE RENDER GRID ---
        function drawGrid() {
            const grid = document.getElementById('char-grid');
            if (!grid) return;
            
            grid.innerHTML = ""; // Clear everything
            alphabet.forEach(letter => {
                const btn = document.createElement('div');
                btn.className = `glyph-box ${currentLetter === letter ? 'active' : ''}`;
                btn.innerText = letter === 'PLATE' ? '■' : letter;
                btn.onclick = () => select(letter);
                grid.appendChild(btn);
            });
        }

        function select(l) {
            currentLetter = l;
            document.getElementById('big-char').innerText = l === 'PLATE' ? '■' : l;
            document.getElementById('char-label').innerText = `Model ${l} - Limited Edition`;
            drawGrid();
        }

        function tab(t) {
            document.getElementById('view-shop').classList.toggle('hidden', t !== 'shop');
            document.getElementById('view-app').classList.toggle('hidden', t !== 'app');
            document.getElementById('t-shop').classList.toggle('active', t === 'shop');
            document.getElementById('t-app').classList.toggle('active', t === 'app');
        }

        async function order() {
            const name = document.getElementById('inp-name').value;
            const color = document.getElementById('inp-color').value;
            if(!name) return;

            try {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('orders').add({
                    name, char: currentLetter, color, time: Date.now()
                });
                alert("Order Saved!");
                document.getElementById('inp-name').value = "";
            } catch(e) { alert("Error"); }
        }

        // --- STARTUP ---
        window.addEventListener('DOMContentLoaded', () => {
            drawGrid();
            firebase.auth().signInAnonymously();
        });

        // Backup call
        drawGrid();
    </script>
</body>
</html>
