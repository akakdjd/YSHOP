<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yahia | V4.0 ULTRA</title>
    
    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { background: #FFFFFF; color: #111; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-font-smoothing: antialiased; }
        .nav-blur { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid #F2F2F7; }
        
        /* FORCED GRID DISPLAY */
        #char-grid { 
            display: grid !important; 
            grid-template-columns: repeat(4, 1fr) !important; 
            gap: 10px !important; 
            margin-top: 15px;
        }
        @media (min-width: 640px) { #char-grid { grid-template-columns: repeat(9, 1fr) !important; } }
        
        .glyph-btn {
            aspect-ratio: 1/1;
            display: flex !important;
            align-items: center;
            justify-content: center;
            background: #F3F3F7;
            border-radius: 14px;
            font-weight: 800;
            font-size: 16px;
            border: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .glyph-btn.active { background: #000 !important; color: #FFF !important; transform: scale(1.05); }
        
        .ios-card { background: #FFF; border-radius: 24px; border: 1px solid #F2F2F7; box-shadow: 0 4px 25px rgba(0,0,0,0.02); }
        .hidden { display: none !important; }
        .floating { animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    </style>
</head>
<body>

    <nav class="nav-blur fixed top-0 w-full z-50 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-black rounded-lg flex items-center justify-center text-white font-black">Y</div>
                <span class="font-extrabold tracking-tighter">YAHIA</span>
                <span class="text-[8px] bg-green-500 text-white px-1.5 py-0.5 rounded ml-1">V4.0</span>
            </div>
            <div class="bg-[#F2F2F7] p-1 rounded-xl flex">
                <button onclick="tab('shop')" id="btn-shop" class="px-4 py-2 rounded-lg text-xs font-bold bg-black text-white">SHOP</button>
                <button onclick="tab('app')" id="btn-app" class="px-4 py-2 rounded-lg text-xs font-bold text-gray-400">APP</button>
            </div>
        </div>
    </nav>

    <main class="pt-24 pb-10 px-6 max-w-4xl mx-auto">
        <div id="view-shop">
            <div class="ios-card p-10 flex flex-col items-center bg-[#FAFAFC] mb-8">
                <div id="big-char" class="floating text-9xl font-black">Y</div>
                <p id="char-label" class="mt-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">Model Y Edition</p>
            </div>

            <div class="mb-8">
                <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4">Choose Your Glyph</h3>
                <div id="char-grid">
                    <!-- LOADING PLACEHOLDER -->
                </div>
            </div>

            <div class="ios-card p-6 space-y-4">
                <input id="inp-name" type="text" placeholder="Full Name" class="w-full bg-[#F2F2F7] p-4 rounded-xl outline-none font-bold">
                <select id="inp-color" class="w-full bg-[#F2F2F7] p-4 rounded-xl outline-none font-bold">
                    <option>Onyx Black</option>
                    <option>Pure Gold</option>
                    <option>Silver Chrome</option>
                </select>
                <button onclick="order()" class="w-full bg-black text-white p-5 rounded-xl font-black">CONFIRM ORDER</button>
            </div>
        </div>

        <div id="view-app" class="hidden text-center py-10">
            <div class="w-20 h-20 bg-black rounded-3xl mx-auto mb-6 flex items-center justify-center text-white text-4xl font-black">Y</div>
            <h2 class="text-2xl font-black mb-8">Yahia Android App</h2>
            <a href="release.apk?v=4" download class="block w-full bg-blue-600 text-white p-5 rounded-2xl font-bold no-underline">DOWNLOAD APK</a>
        </div>
    </main>

    <script>
        // --- DATA ---
        const list = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        list.push("PLATE");
        let active = "Y";

        // --- GRID RENDERER (RUNS IMMEDIATELY) ---
        function draw() {
            const grid = document.getElementById('char-grid');
            if(!grid) return;
            let html = "";
            list.forEach(item => {
                const isSelected = active === item;
                const label = item === 'PLATE' ? '■' : item;
                html += `<button onclick="sel('${item}')" class="glyph-btn ${isSelected ? 'active' : ''}">${label}</button>`;
            });
            grid.innerHTML = html;
        }

        function sel(val) {
            active = val;
            document.getElementById('big-char').innerText = val === 'PLATE' ? '■' : val;
            document.getElementById('char-label').innerText = `Model ${val} Edition`;
            draw();
        }

        function tab(t) {
            document.getElementById('view-shop').classList.toggle('hidden', t !== 'shop');
            document.getElementById('view-app').classList.toggle('hidden', t !== 'app');
            document.getElementById('btn-shop').className = t === 'shop' ? "px-4 py-2 rounded-lg text-xs font-bold bg-black text-white" : "px-4 py-2 rounded-lg text-xs font-bold text-gray-400";
            document.getElementById('btn-app').className = t === 'app' ? "px-4 py-2 rounded-lg text-xs font-bold bg-black text-white" : "px-4 py-2 rounded-lg text-xs font-bold text-gray-400";
        }

        // --- FIREBASE (SAFELY INITIALIZED) ---
        let db;
        try {
            const config = JSON.parse(__firebase_config);
            firebase.initializeApp(config);
            db = firebase.firestore();
            firebase.auth().signInAnonymously();
        } catch(e) { console.log("Firebase Load Error"); }

        async function order() {
            const name = document.getElementById('inp-name').value;
            if(!name) return alert("Missing Name");
            
            // Vault Pass check
            if(name === 'MADMIN/Vault' && active === 'M') { location.reload(); return; }

            try {
                await db.collection('artifacts').doc('yahia-v4').collection('public').doc('data').collection('orders').add({
                    name, char: active, color: document.getElementById('inp-color').value, time: Date.now()
                });
                alert("Success!");
            } catch(e) { alert("Check Connection"); }
        }

        // --- INITIAL KICKSTART ---
        draw();
        // Force draw again in case of race condition
        setTimeout(draw, 100);
    </script>
</body>
</html>
